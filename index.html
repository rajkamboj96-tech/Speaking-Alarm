<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Sec Voice & Sound Alarm</title>
    <style>
        :root { --primary: #22d3ee; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #f43f5e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        #clock { font-size: 3.5rem; text-align: center; font-weight: 800; color: var(--primary); margin-bottom: 20px; font-variant-numeric: tabular-nums; text-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
        
        .section { background: #0f172a; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        
        input[type="time"], input[type="text"], input[type="file"] {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem;
        }

        .day-flex { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .day-check { display: none; }
        .day-label { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 50%; font-size: 0.7rem; cursor: pointer; transition: 0.2s; }
        .day-check:checked + .day-label { background: var(--primary); color: #0f172a; font-weight: bold; }

        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--primary); color: #0f172a; font-size: 1rem; margin-top: 5px; }
        .btn-stop { background: var(--danger); color: white; display: none; margin-bottom: 15px; animation: pulse 2s infinite; }
        .btn-reset { background: transparent; color: #64748b; border: 1px solid #334155; margin-top: 25px; font-size: 0.8rem; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .alarm-item { background: #334155; padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .ringtone-tag { font-size: 0.7rem; color: #94a3b8; display: block; margin-top: 4px; }
        .btn-del { width: auto; background: #475569; color: white; padding: 6px 12px; font-size: 0.75rem; margin-left: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="clock">00:00:00</div>

    <button id="stopBtn" class="btn-stop" onclick="stopEverything()">🛑 STOP ALARM (30s Timer Active)</button>

    <div class="section">
        <label>1. Time & Message</label>
        <input type="time" id="alarmTime">
        <input type="text" id="alarmNote" placeholder="e.g. Morning Meeting">
        
        <label>2. Custom Sound</label>
        <input type="file" id="audioFile" accept="audio/*">
        
        <label>3. Repeat Days</label>
        <div class="day-flex">
            <input type="checkbox" id="d0" class="day-check" value="0"><label for="d0" class="day-label">S</label>
            <input type="checkbox" id="d1" class="day-check" value="1" checked><label for="d1" class="day-label">M</label>
            <input type="checkbox" id="d2" class="day-check" value="2" checked><label for="d2" class="day-label">T</label>
            <input type="checkbox" id="d3" class="day-check" value="3" checked><label for="d3" class="day-label">W</label>
            <input type="checkbox" id="d4" class="day-check" value="4" checked><label for="d4" class="day-label">T</label>
            <input type="checkbox" id="d5" class="day-check" value="5" checked><label for="d5" class="day-label">F</label>
            <input type="checkbox" id="d6" class="day-check" value="6"><label for="d6" class="day-label">S</label>
        </div>

        <button class="btn-add" onclick="saveNewAlarm()">+ ADD ALARM</button>
    </div>

    <div id="alarmList"></div>
    <button class="btn-reset" onclick="resetApp()">FACTORY RESET</button>
</div>

<audio id="player" loop></audio>

<script>
    let alarms = JSON.parse(localStorage.getItem('multiAlarms')) || [];
    const player = document.getElementById('player');
    let db;
    let stopTimeout = null; // Variable to hold the 30s timer

    const request = indexedDB.open("MultiAlarmDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("sounds");
    request.onsuccess = e => { db = e.target.result; render(); };

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: true });

        if (now.getSeconds() === 0) {
            const time24 = now.toLocaleTimeString('en-GB', { hour12: false }).substring(0, 5);
            const today = now.getDay();
            alarms.forEach(a => {
                if (a.time === time24 && a.days.includes(today)) triggerAlarmSequence(a);
            });
        }
    }
    setInterval(updateClock, 1000);

    async function saveNewAlarm() {
        const timeInput = document.getElementById('alarmTime').value;
        const noteInput = document.getElementById('alarmNote').value || "Alarm Triggered";
        const fileInput = document.getElementById('audioFile');
        const file = fileInput.files[0];
        const days = Array.from({length: 7}, (_, i) => i).filter(i => document.getElementById(`d${i}`).checked);

        if(!timeInput || !file) return alert("Select Time and Audio File!");

        const alarmId = "AL_" + Date.now();
        const fileName = file.name;

        const trans = db.transaction("sounds", "readwrite").objectStore("sounds").put(file, alarmId);
        trans.onsuccess = () => {
            alarms.push({ id: alarmId, time: timeInput, note: noteInput, days, fileName });
            localStorage.setItem('multiAlarms', JSON.stringify(alarms));
            render();
            fileInput.value = "";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        };
    }

    function triggerAlarmSequence(alarm) {
        document.getElementById('stopBtn').style.display = "block";
        
        const trans = db.transaction("sounds", "readonly").objectStore("sounds").get(alarm.id);
        trans.onsuccess = () => {
            const blob = trans.result;
            if(blob) player.src = URL.createObjectURL(blob);
            
            const [h, m] = alarm.time.split(':');
            const h12 = h % 12 || 12;
            const ampm = h >= 12 ? "PM" : "AM";

            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(`Attention. The time is ${h12} ${m} ${ampm}. Reminder: ${alarm.note}`);
            
            msg.onend = () => { 
                if(player.src) {
                    player.play();
                    
                    // START THE 30 SECOND TIMER HERE
                    clearTimeout(stopTimeout); // Clear any old timer
                    stopTimeout = setTimeout(() => {
                        stopEverything();
                        console.log("Alarm auto-stopped after 30 seconds.");
                    }, 30000); 
                }
            };
            window.speechSynthesis.speak(msg);
        };
    }

    function stopEverything() {
        window.speechSynthesis.cancel();
        player.pause();
        player.currentTime = 0;
        document.getElementById('stopBtn').style.display = "none";
        clearTimeout(stopTimeout); // Clear timer if user stops manually
    }

    function deleteAlarm(id) {
        alarms = alarms.filter(a => a.id !== id);
        localStorage.setItem('multiAlarms', JSON.stringify(alarms));
        db.transaction("sounds", "readwrite").objectStore("sounds").delete(id);
        render();
    }

    function resetApp() {
        if(confirm("Factory Reset?")) {
            localStorage.clear();
            db.transaction("sounds", "readwrite").objectStore("sounds").clear().onsuccess = () => location.reload();
        }
    }

    function render() {
        const list = document.getElementById('alarmList');
        list.innerHTML = alarms.length > 0 ? "<small style='color:var(--primary)'>ACTIVE ALARMS</small>" : "";
        alarms.sort((a,b)=>a.time.localeCompare(b.time)).forEach(a => {
            const [h, m] = a.time.split(':');
            const displayTime = (h % 12 || 12) + ":" + m + (h >= 12 ? " PM" : " AM");
            const div = document.createElement('div');
            div.className = 'alarm-item';
            div.innerHTML = `<div><b style="color:var(--primary)">${displayTime}</b><br><span>${a.note}</span><span class="ringtone-tag">🎵 ${a.fileName}</span></div><button class="btn-del" onclick="deleteAlarm('${a.id}')">Remove</button>`;
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
